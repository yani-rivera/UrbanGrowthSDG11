  zero_bedrooms:
    description: "habitaciones: 0"
    regex: "\\b(habitaciones?|hab(?:s)?|bedrooms?)\\s*(?:=|:)?\\s*0\\b"

  price_per_m2:
    description: "$50 por m2"
    regex: "\\$\\s*\\d+(?:[.,]\\d+)?\\s*(?:x|por)\\s*m(?:2|²)"

  land_price_patterns:
